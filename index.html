<html lang="ar"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HeartSync - نبض واحد .. قلب واحد</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Tajawal:wght@300;400;500;700&display=swap');
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: 'Tajawal', 'Cairo', sans-serif;
      background: linear-gradient(145deg, #ff758c 0%, #ff7eb3 50%, #ff9a9e 100%);
      text-align: center;
      color: #fff;
      overflow-x: hidden;
      position: relative;
    }

    /* خلفية متحركة متطورة */
    .romantic-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .floating-hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: rotate 60s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .heart-particle {
      position: absolute;
      color: rgba(255, 255, 255, 0.4);
      font-size: 24px;
      filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
      animation: floatAround 8s ease-in-out infinite;
    }

    @keyframes floatAround {
      0%, 100% {
        transform: translate(0, 0) rotate(0deg) scale(1);
      }
      25% {
        transform: translate(30px, -30px) rotate(10deg) scale(1.1);
      }
      50% {
        transform: translate(0, -50px) rotate(0deg) scale(1);
      }
      75% {
        transform: translate(-30px, -30px) rotate(-10deg) scale(1.1);
      }
    }

    /* طبقة ضباب رومانسية */
    .romantic-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent 0%, rgba(255, 120, 150, 0.2) 100%);
      pointer-events: none;
      z-index: 1;
    }

    /* نجوم متلألئة */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background: transparent;
      animation: sparkle 4s ease-in-out infinite;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.8; }
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 60px 60px 60px 60px;
      box-shadow: 
        0 30px 70px rgba(255, 75, 100, 0.3),
        0 0 0 2px rgba(255, 255, 255, 0.5) inset,
        0 0 30px rgba(255, 200, 220, 0.5);
      max-width: 500px;
      width: 90%;
      position: relative;
      z-index: 2;
      border: 3px solid rgba(255, 255, 255, 0.7);
      animation: gentleGlow 3s ease-in-out infinite;
    }

    @keyframes gentleGlow {
      0%, 100% {
        box-shadow: 
          0 30px 70px rgba(255, 75, 100, 0.3),
          0 0 0 2px rgba(255, 255, 255, 0.5) inset,
          0 0 30px rgba(255, 200, 220, 0.5);
      }
      50% {
        box-shadow: 
          0 40px 80px rgba(255, 75, 100, 0.5),
          0 0 0 3px rgba(255, 255, 255, 0.8) inset,
          0 0 50px rgba(255, 200, 220, 0.8);
      }
    }

    h1 {
      color: #ff4d6d;
      font-size: 3em;
      margin-bottom: 5px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.5);
    }

    h1 span {
      display: inline-block;
      animation: romanticBeat 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 15px #ff4d6d);
    }

    h1 span:first-child {
      animation-delay: 0s;
    }

    h1 span:last-child {
      animation-delay: 0.9s;
    }

    @keyframes romanticBeat {
      0%, 100% {
        transform: scale(1) rotate(0deg);
        color: #ff4d6d;
      }
      25% {
        transform: scale(1.3) rotate(5deg);
        color: #ff6b8b;
      }
      50% {
        transform: scale(1.2) rotate(-5deg);
        color: #ff4d6d;
      }
      75% {
        transform: scale(1.1) rotate(3deg);
        color: #ff8aa1;
      }
    }

    .romantic-subtitle {
      color: #ff6b8b;
      font-size: 1.4em;
      margin-bottom: 25px;
      font-weight: 500;
      text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.3);
      position: relative;
      display: inline-block;
      padding: 0 20px;
    }

    .romantic-subtitle::before,
    .romantic-subtitle::after {
      content: "💕";
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.2em;
      animation: slideHearts 2s ease-in-out infinite;
    }

    .romantic-subtitle::before {
      left: -15px;
    }

    .romantic-subtitle::after {
      right: -15px;
    }

    @keyframes slideHearts {
      0%, 100% { transform: translateY(-50%) scale(1); }
      50% { transform: translateY(-50%) scale(1.2); }
    }

    .love-quote {
      background: linear-gradient(135deg, #fff0f3, #ffe4e8);
      padding: 25px;
      border-radius: 50px;
      margin: 25px 0;
      box-shadow: 0 10px 30px rgba(255, 75, 100, 0.2);
    }

    .quote-text {
      color: #ff4d6d;
      font-size: 1.3em;
      font-weight: 500;
      line-height: 1.6;
      margin: 0;
      font-style: italic;
    }

    .quote-author {
      color: #ff8aa1;
      margin-top: 10px;
      font-size: 0.9em;
    }

    .romantic-loader {
      margin: 30px 0;
      position: relative;
    }

    .beating-hearts {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .beating-heart {
      font-size: 40px;
      animation: romanticPulse 1.5s ease-in-out infinite;
      filter: drop-shadow(0 0 15px #ff4d6d);
    }

    .beating-heart:nth-child(2) {
      animation-delay: 0.3s;
      font-size: 50px;
    }

    .beating-heart:nth-child(3) {
      animation-delay: 0.6s;
    }

    @keyframes romanticPulse {
      0%, 100% {
        transform: scale(1);
        filter: drop-shadow(0 0 10px #ff4d6d);
      }
      50% {
        transform: scale(1.3);
        filter: drop-shadow(0 0 30px #ff1744);
      }
    }

    .message {
      color: #ff6b8b;
      font-size: 1.3em;
      margin: 25px 0;
      line-height: 1.8;
      font-weight: 500;
    }

    .tiny-hearts {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 15px 0;
      font-size: 20px;
    }

    .tiny-hearts span {
      animation: twinkle 2s ease-in-out infinite;
    }

    .tiny-hearts span:nth-child(2) { animation-delay: 0.3s; }
    .tiny-hearts span:nth-child(3) { animation-delay: 0.6s; }
    .tiny-hearts span:nth-child(4) { animation-delay: 0.9s; }
    .tiny-hearts span:nth-child(5) { animation-delay: 1.2s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }

    .romantic-button {
      padding: 18px 35px;
      background: linear-gradient(145deg, #ff4d6d, #ff1744);
      color: #fff;
      text-decoration: none;
      border-radius: 60px;
      font-size: 1.3em;
      font-weight: 600;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      border: none;
      box-shadow: 
        0 15px 30px rgba(255, 23, 68, 0.4),
        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
      position: relative;
      overflow: hidden;
      font-family: 'Tajawal', sans-serif;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
    }

    .romantic-button:hover {
      transform: translateY(-5px) scale(1.02);
      box-shadow: 
        0 25px 40px rgba(255, 23, 68, 0.5),
        0 0 0 3px rgba(255, 255, 255, 0.5) inset;
    }

    .romantic-button:active {
      transform: translateY(0) scale(0.98);
    }

    .romantic-button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      transform: rotate(45deg);
      animation: shimmer 3s linear infinite;
    }

    @keyframes shimmer {
      0% { transform: translateX(-100%) rotate(45deg); }
      100% { transform: translateX(100%) rotate(45deg); }
    }

    .open-app-button {
      background: linear-gradient(145deg, #ff4d6d, #ff1744);
    }

    .download-button {
      background: linear-gradient(145deg, #ff8aa1, #ff6b8b);
      box-shadow: 
        0 15px 30px rgba(255, 107, 139, 0.3),
        0 0 0 2px rgba(255, 255, 255, 0.3) inset;
    }

    /* رسالة منبثقة رومانسية */
    .love-message-popup {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 15px 30px;
      border-radius: 50px;
      color: #ff4d6d;
      font-size: 1.1em;
      box-shadow: 0 10px 30px rgba(255, 23, 68, 0.3);
      z-index: 1000;
      animation: slideUpMessage 3s ease-in-out forwards;
      border: 2px solid #ff8aa1;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    @keyframes slideUpMessage {
      0% {
        bottom: -100px;
        opacity: 0;
      }
      15% {
        bottom: 20px;
        opacity: 1;
      }
      85% {
        bottom: 20px;
        opacity: 1;
      }
      100% {
        bottom: -100px;
        opacity: 0;
      }
    }

    /* مؤقت العد التنازلي */
    .timer-message {
      color: #ff8aa1;
      font-size: 1em;
      margin-top: 10px;
      animation: fadeInOut 2s ease-in-out;
    }

    @keyframes fadeInOut {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 480px) {
      .container {
        padding: 30px 20px;
        border-radius: 40px;
      }
      
      h1 {
        font-size: 2.2em;
      }
      
      .romantic-subtitle {
        font-size: 1.1em;
      }
      
      .quote-text {
        font-size: 1.1em;
      }
      
      .romantic-button {
        padding: 15px 25px;
        font-size: 1.1em;
      }
    }
  </style>
</head>

  <script>
    // إنشاء خلفية رومانسية متحركة
    function createRomanticBackground() {
      const container = document.getElementById('floatingHearts');
      const heartSymbols = ['💗', '💖', '💝', '💕', '💞', '💓', '💘', '💟', '💌'];
      const colors = ['#ff4d6d', '#ff6b8b', '#ff8aa1', '#ffa5b9', '#ffc0cb'];
      
      for (let i = 0; i < 40; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart-particle';
        heart.innerHTML = heartSymbols[Math.floor(Math.random() * heartSymbols.length)];
        heart.style.left = Math.random() * 100 + '%';
        heart.style.top = Math.random() * 100 + '%';
        heart.style.fontSize = (Math.random() * 30 + 15) + 'px';
        heart.style.animationDelay = Math.random() * 5 + 's';
        heart.style.animationDuration = (Math.random() * 6 + 5) + 's';
        heart.style.color = colors[Math.floor(Math.random() * colors.length)];
        heart.style.opacity = Math.random() * 0.3 + 0.2;
        container.appendChild(heart);
      }
    }

    // إنشاء النجوم المتلألئة
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 50; i++) {
        const star = document.createElement('div');
        star.style.position = 'absolute';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.width = '2px';
        star.style.height = '2px';
        star.style.background = '#fff';
        star.style.borderRadius = '50%';
        star.style.boxShadow = '0 0 10px #fff, 0 0 20px #ff4d6d';
        star.style.animation = `sparkle ${Math.random() * 3 + 2}s ease-in-out infinite`;
        star.style.animationDelay = Math.random() * 2 + 's';
        starsContainer.appendChild(star);
      }
    }

    // منطق فتح التطبيق
    const appScheme = "heartsync://join";
    const urlWithParams = appScheme + window.location.search;
    const now = Date.now();

    // الحصول على عنصر الزر
    const openAppBtn = document.getElementById("openAppBtn");
    const timerMessage = document.getElementById("timerMessage");

    // إظهار الزر مباشرة للتأكد من وجوده (للاختبار)
    // openAppBtn.style.display = "flex"; // يمكنك تفعيل هذا للسطر للاختبار

    // محاولة فتح التطبيق تلقائياً بعد تأخير بسيط
    setTimeout(() => {
      try {
        window.location.href = urlWithParams;
        console.log("محاولة فتح التطبيق: " + urlWithParams);
      } catch (e) {
        console.log("خطأ في فتح التطبيق: " + e);
      }
    }, 500);

    // إظهار رسالة العد التنازلي
    function showTimerMessage() {
      timerMessage.style.display = "block";
      timerMessage.innerHTML = "⏳ جاري التحقق من وجود التطبيق... ⏳";
      
      setTimeout(() => {
        timerMessage.style.display = "none";
      }, 1400);
    }

    // إظهار الرسالة المنبثقة
    function showLoveMessage() {
      const message = document.createElement('div');
      message.className = 'love-message-popup';
      message.innerHTML = '💗 إذا لم يفتح التطبيق، اضغط على الزر 💗';
      document.body.appendChild(message);
      
      setTimeout(() => {
        message.remove();
      }, 4000);
    }

    // إظهار زر فتح التطبيق بعد 1.5 ثانية (بغض النظر عن شيء)
    setTimeout(() => {
      // إظهار الزر بشكل واضح
      openAppBtn.style.display = "flex";
      openAppBtn.style.opacity = "1";
      openAppBtn.style.visibility = "visible";
      
      // إظهار رسالة للمستخدم
      showLoveMessage();
      
      console.log("تم إظهار الزر بعد 1.5 ثانية");
    }, 1500);

    // فتح التطبيق عند الضغط على زر "فتح تطبيق الحب"
    openAppBtn.addEventListener("click", function() {
      console.log("تم الضغط على زر فتح التطبيق");
      
      // تغيير نص الزر مؤقتاً
      const originalText = openAppBtn.innerHTML;
      openAppBtn.innerHTML = '💗 جاري الفتح... 💗';
      
      // محاولة فتح التطبيق
      window.location.href = urlWithParams;
      
      // إعادة النص الأصلي بعد ثانية
      setTimeout(() => {
        openAppBtn.innerHTML = originalText;
      }, 1000);
    });

    // بدأ الحركات
    createRomanticBackground();
    createStars();

    // إظهار رسالة الترحيب
    setTimeout(showTimerMessage, 1000);

    // التحقق من حالة الصفحة
    window.addEventListener('load', function() {
      console.log("الصفحة تحمست بالكامل");
      
      // التأكد من وجود الزر
      if (openAppBtn) {
        console.log("الزر موجود في الصفحة");
      } else {
        console.log("الزر غير موجود!");
      }
    });

    // للتحقق من محاولة فتح التطبيق
    window.addEventListener('blur', function() {
      console.log('تم فتح التطبيق بنجاح 💗');
      
      // يمكن إخفاء الزر إذا فتح التطبيق
      openAppBtn.style.display = "none";
    });

    // إذا رجع المستخدم للصفحة (لم يفتح التطبيق)
